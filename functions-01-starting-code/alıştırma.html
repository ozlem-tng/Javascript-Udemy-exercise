<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
 
</head>
<body>
    <script>
        const number =prompt("log in the number :");
        Document.write(Math.sqrt(number));

        
class circle{
     constructor(radius){
        this.radius=radius;
     }
     area (){
        return Math.PI*this.radius;

     }
     environment(){
        return 2*Math.PI*this.radius;

     }

}

    const radius = prompt("Give me a radius: ");
    circle(radius);
Document.write("AREA= " +circle.area+ "ENVIRONMENT= "+ circle.environment);
        


    </script>
 
</body>
</html>
